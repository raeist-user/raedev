<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raedev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            orange: '#ff6b00',
                            dark: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
        }

        /* Developer Grid Background */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        /* Blinking Terminal Cursor */
        .cursor-blink {
            animation: blink 1s step-end infinite;
            color: #ff6b00;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden selection:bg-brand-orange selection:text-white">

    <div class="absolute inset-0 bg-grid pointer-events-none"></div>

    <main class="relative z-10 flex flex-col items-center justify-center p-6 text-center">
        
        <h1 class="font-sans text-5xl md:text-7xl font-semibold tracking-tight text-white mb-6">
            raedev<span class="cursor-blink font-mono font-light">_</span>
        </h1>
        
        <div class="h-[1px] w-12 bg-gray-800 mb-6"></div>
        
        <p class="font-mono text-xs md:text-sm tracking-[0.3em] text-gray-500 uppercase">
            ( Under - Construction )
        </p>

        <!-- Email Link -->
        <a href="mailto:raedevism@gmail.com" class="group mt-16 inline-flex items-center gap-1.5 font-mono text-xs tracking-widest text-gray-500 hover:text-brand-orange transition-colors duration-300">
            raedevism@gmail.com
            <svg class="w-3 h-3 transition-transform duration-300 group-hover:translate-x-1 group-hover:-translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M17 7H7M17 7V17"></path>
            </svg>
        </a>

    </main>

</body>
</html>
